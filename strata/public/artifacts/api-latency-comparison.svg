<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="Avenir Next, Segoe UI, sans-serif">
  <rect width="640" height="320" fill="#1f1712" rx="8"/>
  <text x="320" y="32" text-anchor="middle" fill="#8a7568" font-size="13" letter-spacing="0.1em">P95 LATENCY (ms)</text>
  <!-- Y axis labels -->
  <text x="52" y="80" text-anchor="end" fill="#5e4a3f" font-size="11">400</text>
  <text x="52" y="140" text-anchor="end" fill="#5e4a3f" font-size="11">300</text>
  <text x="52" y="200" text-anchor="end" fill="#5e4a3f" font-size="11">200</text>
  <text x="52" y="260" text-anchor="end" fill="#5e4a3f" font-size="11">100</text>
  <!-- Grid lines -->
  <line x1="60" y1="76" x2="600" y2="76" stroke="#2a2018" stroke-width="1"/>
  <line x1="60" y1="136" x2="600" y2="136" stroke="#2a2018" stroke-width="1"/>
  <line x1="60" y1="196" x2="600" y2="196" stroke="#2a2018" stroke-width="1"/>
  <line x1="60" y1="256" x2="600" y2="256" stroke="#2a2018" stroke-width="1"/>
  <!-- Endpoint labels -->
  <text x="160" y="296" text-anchor="middle" fill="#8a7568" font-size="11">/checkout</text>
  <text x="320" y="296" text-anchor="middle" fill="#8a7568" font-size="11">/products</text>
  <text x="480" y="296" text-anchor="middle" fill="#8a7568" font-size="11">/inventory</text>
  <!-- GraphQL bars -->
  <rect x="116" y="96" width="40" height="164" fill="#9f3d24" rx="3"/>
  <rect x="276" y="116" width="40" height="144" fill="#9f3d24" rx="3"/>
  <rect x="436" y="76" width="40" height="184" fill="#9f3d24" rx="3"/>
  <!-- REST bars -->
  <rect x="164" y="186" width="40" height="74" fill="#4a9f62" rx="3"/>
  <rect x="324" y="196" width="40" height="64" fill="#4a9f62" rx="3"/>
  <rect x="484" y="176" width="40" height="84" fill="#4a9f62" rx="3"/>
  <!-- Legend -->
  <rect x="200" y="46" width="12" height="12" fill="#9f3d24" rx="2"/>
  <text x="218" y="57" fill="#9f3d24" font-size="11">GraphQL</text>
  <rect x="300" y="46" width="12" height="12" fill="#4a9f62" rx="2"/>
  <text x="318" y="57" fill="#4a9f62" font-size="11">REST</text>
