<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="Avenir Next, Segoe UI, sans-serif">
  <rect width="640" height="320" fill="#1f1712" rx="8"/>
  <text x="320" y="32" text-anchor="middle" fill="#8a7568" font-size="13" letter-spacing="0.1em">ON-CALL PAGES PER WEEK</text>
  <!-- Y axis labels -->
  <text x="52" y="80" text-anchor="end" fill="#5e4a3f" font-size="11">20</text>
  <text x="52" y="140" text-anchor="end" fill="#5e4a3f" font-size="11">15</text>
  <text x="52" y="200" text-anchor="end" fill="#5e4a3f" font-size="11">10</text>
  <text x="52" y="260" text-anchor="end" fill="#5e4a3f" font-size="11">5</text>
  <!-- Grid lines -->
  <line x1="60" y1="76" x2="600" y2="76" stroke="#2a2018" stroke-width="1"/>
  <line x1="60" y1="136" x2="600" y2="136" stroke="#2a2018" stroke-width="1"/>
  <line x1="60" y1="196" x2="600" y2="196" stroke="#2a2018" stroke-width="1"/>
  <line x1="60" y1="256" x2="600" y2="256" stroke="#2a2018" stroke-width="1"/>
  <!-- GraphQL era bars (warm) -->
  <rect x="80" y="86" width="32" height="170" fill="#9f3d24" rx="3"/>
  <rect x="128" y="100" width="32" height="156" fill="#9f3d24" rx="3"/>
  <rect x="176" y="76" width="32" height="180" fill="#9f3d24" rx="3"/>
  <rect x="224" y="92" width="32" height="164" fill="#9f3d24" rx="3"/>
  <rect x="272" y="82" width="32" height="174" fill="#9f3d24" rx="3"/>
  <!-- Migration marker -->
  <line x1="330" y1="56" x2="330" y2="270" stroke="#ead4c5" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="330" y="52" text-anchor="middle" fill="#ead4c5" font-size="10">MIGRATION</text>
  <!-- REST era bars (green) -->
  <rect x="360" y="196" width="32" height="60" fill="#4a9f62" rx="3"/>
  <rect x="408" y="206" width="32" height="50" fill="#4a9f62" rx="3"/>
  <rect x="456" y="216" width="32" height="40" fill="#4a9f62" rx="3"/>
  <rect x="504" y="210" width="32" height="46" fill="#4a9f62" rx="3"/>
  <rect x="552" y="220" width="32" height="36" fill="#4a9f62" rx="3"/>
  <!-- Labels -->
  <text x="192" y="296" text-anchor="middle" fill="#9f3d24" font-size="11" font-weight="600">GraphQL era</text>
  <text x="472" y="296" text-anchor="middle" fill="#4a9f62" font-size="11" font-weight="600">REST era</text>
</svg>
